server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /data/ {
        add_header Cache-Control "public, max-age=3600";
    }

    gzip on;
    gzip_types application/json text/html text/css application/javascript;
    gzip_min_length 1000;
}
