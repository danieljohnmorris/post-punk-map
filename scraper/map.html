<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Genre Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      touch-action: none;
      -webkit-overflow-scrolling: none;
    }

    canvas {
      display: block;
      cursor: grab;
      touch-action: none;
    }
    canvas:active { cursor: grabbing; }

    #search-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 0;
      width: min(600px, 90vw);
    }

    #search {
      flex: 1;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid #333;
      color: #fff;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 18px;
      font-weight: 700;
      padding: 10px 16px;
      outline: none;
      caret-color: #fff;
      border-radius: 4px 0 0 4px;
    }
    #search::placeholder { color: #444; }
    #search:focus { border-color: #666; }

    #search-count {
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid #333;
      border-left: none;
      color: #555;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      border-radius: 0 4px 4px 0;
      white-space: nowrap;
    }

    #tooltip {
      position: fixed;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(8px);
      border: 1px solid #444;
      color: #fff;
      padding: 10px 16px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      z-index: 30;
      max-width: 420px;
      font-size: 13px;
    }
    #tooltip .tt-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    #tooltip .tt-count { color: #888; font-size: 12px; }
    #tooltip .tt-bands { color: #aaa; margin-top: 6px; line-height: 1.5; }

    #info {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 20;
      background: rgba(10,10,10,0.85);
      border: 1px solid #222;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
    }
    #info .row { margin-bottom: 2px; }

    #band-panel {
      position: fixed;
      top: 70px;
      right: 16px;
      z-index: 20;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid #333;
      border-radius: 4px;
      width: 300px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      display: none;
      padding: 0;
    }
    #band-panel-header {
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.98);
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #band-panel-header .tag-name {
      font-weight: 700;
      font-size: 16px;
      color: #f05;
    }
    #band-panel-header .close-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }
    #band-panel-header .close-btn:hover { color: #fff; }
    #band-list {
      padding: 8px 16px 16px;
    }

    #filter-bar {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(700px, 95vw);
    }

    .filter-btn {
      position: relative;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid #333;
      color: #666;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    .filter-btn:hover { border-color: #555; color: #ccc; }
    .filter-btn.active { border-color: #f05; color: #f05; }
    .filter-btn.open { border-color: #666; color: #ccc; }

    .filter-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: rgba(15,15,15,0.97);
      backdrop-filter: blur(12px);
      border: 1px solid #333;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      min-width: 180px;
      z-index: 30;
    }
    .filter-dropdown.show { display: block; }
    .filter-dropdown .filter-option {
      padding: 6px 12px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-dropdown .filter-option:hover { background: #1a1a1a; color: #fff; }
    .filter-dropdown .filter-option.selected { color: #f05; }
    .filter-dropdown .filter-search {
      padding: 6px 12px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: rgba(15,15,15,0.98);
    }
    .filter-dropdown .filter-search input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #fff;
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      border-radius: 2px;
      font-family: Helvetica, Arial, sans-serif;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #loading .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #f05;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading .status {
      color: #444;
      font-size: 13px;
      margin-top: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="title">LOADING</div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="search-bar">
    <input type="text" id="search" placeholder="search tags..." autofocus>
    <div id="search-count">0 tags</div>
  </div>

  <div id="tooltip">
    <div class="tt-name"></div>
    <div class="tt-count"></div>
    <div class="tt-bands"></div>
  </div>

  <div id="band-panel">
    <div id="band-panel-header">
      <span class="tag-name"></span>
      <button class="close-btn">&times;</button>
    </div>
    <div id="band-list"></div>
  </div>

  <div id="info">
    <div class="row" id="info-tags"></div>
    <div class="row" id="info-zoom"></div>
    <div class="row" id="info-hint">scroll to zoom, drag to pan, click tag to see bands</div>
  </div>

  <script>
    // --- State ---
    let data = null;
    let nodes = [];
    let links = [];
    let bandsByTag = {};
    let facets = {};        // { countries, decades, labels, moods, vocalists }
    let activeFilter = null; // { category: "country", value: "british", genreSet: Set }
    let filterHighlight = new Set(); // genre tag ids to highlight

    // Camera
    let camX = 0, camY = 0, camZoom = 0.5;
    let dragging = false, dragStartX = 0, dragStartY = 0, dragCamX = 0, dragCamY = 0;

    // Interaction
    let hoveredNode = null;
    let selectedTag = null;
    let selectedNeighbors = new Set(); // tag ids connected to selectedTag
    let selectedLinkSet = new Set();   // "src|tgt" strings for highlighted links
    let searchQuery = "";
    let searchMatches = new Set();

    // Canvas
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let W, H;
    let dpr = window.devicePixelRatio || 1;

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      requestDraw();
    }
    window.addEventListener("resize", resize);

    // Prevent all default touch/gesture behavior on the page
    document.addEventListener("gesturestart", function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener("gesturechange", function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener("gestureend", function(e) { e.preventDefault(); }, { passive: false });

    // --- Data Loading ---
    async function loadData() {
      const res = await fetch("/data/graph-full.json");
      data = await res.json();

      nodes = data.nodes.map(function(n) {
        return { id: n[0], x: n[1], y: n[2], count: n[3], tier: n[4] };
      });

      links = data.links.map(function(l) {
        return { src: l[0], tgt: l[1], weight: l[2] };
      });

      bandsByTag = data.bandsByTag || {};
      facets = data.facets || {};
      populateFilters();

      // Center camera on initially visible nodes (tier 0+1) not all nodes
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const n of nodes) {
        if (n.tier > 1) continue; // only fit to tier 0+1 (what's visible on load)
        if (n.x < minX) minX = n.x;
        if (n.x > maxX) maxX = n.x;
        if (n.y < minY) minY = n.y;
        if (n.y > maxY) maxY = n.y;
      }
      camX = (minX + maxX) / 2;
      camY = (minY + maxY) / 2;
      const spanX = maxX - minX;
      const spanY = maxY - minY;
      camZoom = Math.min(W / (spanX * 1.1), H / (spanY * 1.1));

      document.getElementById("loading").style.display = "none";
      document.getElementById("search-count").textContent = nodes.length + " tags";
      document.getElementById("info-tags").textContent = nodes.length + " tags, " + links.length + " links";
      updateZoomInfo();
      requestDraw();
    }

    // --- Coordinate transforms ---
    function worldToScreen(wx, wy) {
      return [
        (wx - camX) * camZoom + W / 2,
        (wy - camY) * camZoom + H / 2,
      ];
    }
    function screenToWorld(sx, sy) {
      return [
        (sx - W / 2) / camZoom + camX,
        (sy - H / 2) / camZoom + camY,
      ];
    }

    // --- Tier visibility based on zoom ---
    function visibleTier() {
      if (camZoom > 2.5) return 3;
      if (camZoom > 1.0) return 2;
      if (camZoom > 0.4) return 1;
      return 0;
    }

    function isNodeVisible(node) {
      if (searchQuery && searchMatches.has(node.id)) return true;
      if (activeFilter && filterHighlight.has(node.id)) return true;
      return node.tier <= visibleTier();
    }

    // --- Drawing ---
    let drawRAF = null;
    function requestDraw() {
      if (!drawRAF) drawRAF = requestAnimationFrame(draw);
    }

    function draw() {
      drawRAF = null;
      if (!data) return;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(0, 0, W, H);

      const vt = visibleTier();

      // Visible bounds (world coords) with padding
      const pad = 100;
      const wl = screenToWorld(-pad, 0)[0];
      const wt = screenToWorld(0, -pad)[1];
      const wr = screenToWorld(W + pad, 0)[0];
      const wb = screenToWorld(0, H + pad)[1];

      // --- Draw links ---
      if (camZoom > 0.3) {
        const visIdx = new Set();
        for (let i = 0; i < nodes.length; i++) {
          const n = nodes[i];
          if (isNodeVisible(n) && n.x >= wl && n.x <= wr && n.y >= wt && n.y <= wb) {
            visIdx.add(i);
          }
        }

        ctx.lineWidth = Math.max(0.3, 0.5 * camZoom);
        for (const l of links) {
          if (!visIdx.has(l.src) || !visIdx.has(l.tgt)) continue;
          const ns = nodes[l.src], nt = nodes[l.tgt];
          const s1 = worldToScreen(ns.x, ns.y);
          const s2 = worldToScreen(nt.x, nt.y);
          const isHighlighted = selectedTag && selectedLinkSet.has(l.src + "|" + l.tgt);
          var bothFilterMatch = activeFilter && filterHighlight.has(nodes[l.src].id) && filterHighlight.has(nodes[l.tgt].id);
          if ((selectedTag && !isHighlighted) || (activeFilter && !bothFilterMatch && !isHighlighted)) {
            // Dim non-related links when a tag is selected
            ctx.strokeStyle = "rgba(255,255,255,0.015)";
            ctx.lineWidth = Math.max(0.2, 0.3 * camZoom);
          } else if (isHighlighted) {
            ctx.strokeStyle = "rgba(255,96,144,0.25)";
            ctx.lineWidth = Math.max(0.5, 0.7 * camZoom);
          } else {
            // Only show strongest links — progressive reveal on zoom
            var minWeight = camZoom < 0.5 ? 200 : camZoom < 1.0 ? 100 : camZoom < 2.0 ? 50 : camZoom < 4 ? 20 : 8;
            if (l.weight < minWeight) continue;
            const alpha = Math.min(0.12, 0.015 + 0.08 * Math.sqrt(l.weight / 200));
            ctx.strokeStyle = "rgba(255,255,255," + alpha + ")";
            ctx.lineWidth = Math.max(0.2, 0.3 * camZoom);
          }
          ctx.beginPath();
          ctx.moveTo(s1[0], s1[1]);
          ctx.lineTo(s2[0], s2[1]);
          ctx.stroke();
        }
      }

      // --- Draw nodes ---
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (const node of nodes) {
        if (!isNodeVisible(node)) continue;
        if (node.x < wl || node.x > wr || node.y < wt || node.y > wb) continue;

        const s = worldToScreen(node.x, node.y);
        const sx = s[0], sy = s[1];
        const r = Math.max(2, Math.min(18, 2.5 + Math.pow(node.count, 0.3) * 0.25) * camZoom);

        const isHovered = node === hoveredNode;
        const isSelected = node.id === selectedTag;
        const isNeighbor = selectedTag && selectedNeighbors.has(node.id);
        const isSearchMatch = searchQuery && searchMatches.has(node.id);
        const isFilterMatch = activeFilter && filterHighlight.has(node.id);
        const isFilterDimmed = activeFilter && !isFilterMatch && !isSelected && !isNeighbor;
        const isDimmed = (selectedTag && !isSelected && !isNeighbor) || isFilterDimmed;

        // Node dot
        var dotColor;
        if (isSelected) dotColor = "#fff";
        else if (isSearchMatch) dotColor = "#ff0";
        else if (isNeighbor) dotColor = "#ff6090";
        else if (isFilterMatch) dotColor = "#0df";
        else if (isHovered) dotColor = "#ff4488";
        else if (isDimmed) dotColor = "rgba(255,0,85,0.12)";
        else {
          var brightness = node.tier === 0 ? 1.0 : node.tier === 1 ? 0.7 : node.tier === 2 ? 0.45 : 0.3;
          dotColor = "rgba(255,0,85," + brightness + ")";
        }

        ctx.fillStyle = dotColor;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fill();

        // Label
        var showLabel = (
          isHovered || isSelected || isSearchMatch ||
          node.tier <= 1 ||
          (node.tier === 2 && camZoom > 1.2) ||
          (node.tier === 3 && camZoom > 3)
        );

        if (showLabel) {
          var labelSize = Math.max(8, Math.min(16, 12 * camZoom));
          var fs = isHovered || isSelected
            ? Math.max(12, labelSize * 1.2)
            : node.tier === 0
              ? Math.max(10, labelSize)
              : Math.max(8, labelSize * 0.75);

          ctx.font = "bold " + fs + "px Helvetica, Arial, sans-serif";

          var labelColor;
          if (isSelected) labelColor = "#ffffff";
          else if (isSearchMatch) labelColor = "rgba(255,255,0,0.9)";
          else if (isNeighbor) labelColor = "rgba(255,96,144,0.9)";
          else if (isFilterMatch) labelColor = "rgba(0,221,255,0.9)";
          else if (isHovered) labelColor = "rgba(255,68,136,0.95)";
          else if (isDimmed) labelColor = "rgba(255,0,85,0.1)";
          else {
            var a = node.tier === 0 ? 0.85 : node.tier === 1 ? 0.6 : 0.4;
            labelColor = "rgba(255,0,85," + a + ")";
          }

          // Text shadow for readability
          ctx.fillStyle = "rgba(10,10,10,0.7)";
          ctx.fillText(node.id, sx + 1, sy + r + fs * 0.6 + 1);
          ctx.fillStyle = labelColor;
          ctx.fillText(node.id, sx, sy + r + fs * 0.6);
        }
      }
    }

    // --- Mouse interaction ---
    let mouseX = 0, mouseY = 0;

    function findNodeAtScreen(sx, sy) {
      var best = null, bestDist = Infinity;
      var maxScreenDist = 30; // pixels on screen

      for (const node of nodes) {
        if (!isNodeVisible(node)) continue;
        var s = worldToScreen(node.x, node.y);
        var r = Math.max(2, Math.min(18, 2.5 + Math.pow(node.count, 0.3) * 0.25) * camZoom);
        // Hit area includes dot + label below it
        var labelH = node.tier <= 1 || camZoom > 1.2 ? 14 : 0;
        var dx = sx - s[0];
        var dy = sy - (s[1] + labelH * 0.3); // shift hit center slightly toward label
        var d = Math.sqrt(dx * dx + dy * dy);
        var hitR = Math.max(maxScreenDist, r + labelH);
        if (d < hitR && d < bestDist) {
          bestDist = d;
          best = node;
        }
      }
      return best;
    }

    canvas.addEventListener("mousemove", function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;

      if (dragging) {
        camX = dragCamX - (e.clientX - dragStartX) / camZoom;
        camY = dragCamY - (e.clientY - dragStartY) / camZoom;
        requestDraw();
        return;
      }

      var node = findNodeAtScreen(e.clientX, e.clientY);
      if (node !== hoveredNode) {
        hoveredNode = node;
        canvas.style.cursor = node ? "pointer" : "grab";
        updateTooltip(e.clientX, e.clientY);
        requestDraw();
      } else if (node) {
        updateTooltip(e.clientX, e.clientY);
      }
    });

    canvas.addEventListener("mousedown", function(e) {
      dragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragCamX = camX;
      dragCamY = camY;
      canvas.style.cursor = "grabbing";
    });

    canvas.addEventListener("mouseup", function(e) {
      var wasDrag = Math.abs(e.clientX - dragStartX) > 3 || Math.abs(e.clientY - dragStartY) > 3;
      dragging = false;
      canvas.style.cursor = hoveredNode ? "pointer" : "grab";

      if (!wasDrag) {
        var node = findNodeAtScreen(e.clientX, e.clientY);
        if (node) {
          selectTag(node.id);
        } else {
          selectTag(null);
        }
      }
    });

    canvas.addEventListener("wheel", function(e) {
      e.preventDefault();
      var wc = screenToWorld(e.clientX, e.clientY);
      var factor = e.deltaY > 0 ? 0.95 : 1.05;
      camZoom = Math.max(0.05, Math.min(20, camZoom * factor));
      camX = wc[0] - (e.clientX - W / 2) / camZoom;
      camY = wc[1] - (e.clientY - H / 2) / camZoom;
      updateZoomInfo();
      hoveredNode = findNodeAtScreen(mouseX, mouseY);
      requestDraw();
    }, { passive: false });

    // --- Touch support ---
    var touches = {};
    var lastPinchDist = 0;

    canvas.addEventListener("touchstart", function(e) {
      e.preventDefault();
      if (e.touches.length === 1) {
        var t = e.touches[0];
        dragging = true;
        dragStartX = t.clientX;
        dragStartY = t.clientY;
        dragCamX = camX;
        dragCamY = camY;
      } else if (e.touches.length === 2) {
        dragging = false;
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        lastPinchDist = Math.sqrt(dx * dx + dy * dy);
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", function(e) {
      e.preventDefault();
      if (e.touches.length === 1 && dragging) {
        var t = e.touches[0];
        camX = dragCamX - (t.clientX - dragStartX) / camZoom;
        camY = dragCamY - (t.clientY - dragStartY) / camZoom;
        requestDraw();
      } else if (e.touches.length === 2) {
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (lastPinchDist > 0) {
          var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          var wc = screenToWorld(midX, midY);
          var factor = dist / lastPinchDist;
          camZoom = Math.max(0.05, Math.min(20, camZoom * factor));
          camX = wc[0] - (midX - W / 2) / camZoom;
          camY = wc[1] - (midY - H / 2) / camZoom;
          updateZoomInfo();
          requestDraw();
        }
        lastPinchDist = dist;
      }
    }, { passive: false });

    canvas.addEventListener("touchend", function(e) {
      e.preventDefault();
      if (e.touches.length === 0 && e.changedTouches.length > 0) {
        var ct = e.changedTouches[0];
        // Check screen-space distance to detect tap vs drag
        var screenDx = Math.abs(ct.clientX - dragStartX);
        var screenDy = Math.abs(ct.clientY - dragStartY);
        if (screenDx < 15 && screenDy < 15) {
          // It was a tap
          var node = findNodeAtScreen(ct.clientX, ct.clientY);
          if (node) selectTag(node.id);
          else selectTag(null);
        }
        dragging = false;
        lastPinchDist = 0;
      }
    }, { passive: false });

    // --- Tooltip ---
    function updateTooltip(mx, my) {
      var tt = document.getElementById("tooltip");
      if (!hoveredNode) {
        tt.style.display = "none";
        return;
      }
      tt.style.display = "block";
      tt.style.left = (mx + 16) + "px";
      tt.style.top = (my - 10) + "px";

      tt.querySelector(".tt-name").textContent = hoveredNode.id;
      tt.querySelector(".tt-count").textContent = hoveredNode.count.toLocaleString() + " artists";

      var bands = (bandsByTag[hoveredNode.id] || []).slice(0, 8);
      var bandsEl = tt.querySelector(".tt-bands");
      // Clear and rebuild safely
      while (bandsEl.firstChild) bandsEl.removeChild(bandsEl.firstChild);
      if (bands.length) {
        for (var i = 0; i < bands.length; i++) {
          if (i > 0) bandsEl.appendChild(document.createTextNode(", "));
          var span = document.createElement("span");
          span.style.color = "#0af";
          span.textContent = bands[i];
          bandsEl.appendChild(span);
        }
        if ((bandsByTag[hoveredNode.id] || []).length > 8) {
          bandsEl.appendChild(document.createTextNode(", ..."));
        }
      }
    }

    // --- Band panel ---
    function selectTag(tagId) {
      selectedTag = tagId;
      selectedNeighbors = new Set();
      selectedLinkSet = new Set();
      var panel = document.getElementById("band-panel");

      if (!tagId) {
        panel.style.display = "none";
        requestDraw();
        return;
      }

      // Find the node index for selectedTag, keep only top 30 strongest connections
      var selIdx = -1;
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].id === tagId) { selIdx = i; break; }
      }
      if (selIdx >= 0) {
        var candidates = [];
        for (var i = 0; i < links.length; i++) {
          var l = links[i];
          if (l.src === selIdx) candidates.push({ idx: l.tgt, linkKey: l.src + "|" + l.tgt, weight: l.weight });
          else if (l.tgt === selIdx) candidates.push({ idx: l.src, linkKey: l.src + "|" + l.tgt, weight: l.weight });
        }
        candidates.sort(function(a, b) { return b.weight - a.weight; });
        var top = candidates.slice(0, 30);
        for (var i = 0; i < top.length; i++) {
          selectedNeighbors.add(nodes[top[i].idx].id);
          selectedLinkSet.add(top[i].linkKey);
        }
      }

      var bands = bandsByTag[tagId] || [];
      panel.style.display = "block";
      panel.querySelector(".tag-name").textContent = tagId;

      var list = document.getElementById("band-list");
      while (list.firstChild) list.removeChild(list.firstChild);
      for (var i = 0; i < bands.length; i++) {
        var div = document.createElement("div");
        div.className = "band";
        div.style.cssText = "color:#888;font-size:14px;padding:3px 0;cursor:default";
        div.addEventListener("mouseenter", function() { this.style.color = "#0af"; });
        div.addEventListener("mouseleave", function() { this.style.color = "#888"; });

        var rank = document.createElement("span");
        rank.style.cssText = "color:#333;font-size:11px;margin-right:6px;font-variant-numeric:tabular-nums";
        rank.textContent = (i + 1).toString();
        div.appendChild(rank);
        div.appendChild(document.createTextNode(bands[i]));
        list.appendChild(div);
      }

      requestDraw();
    }

    document.querySelector("#band-panel-header .close-btn").addEventListener("click", function() {
      selectTag(null);
    });

    // --- Search ---
    var searchInput = document.getElementById("search");
    var searchDebounce;
    searchInput.addEventListener("input", function() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(function() {
        searchQuery = searchInput.value.toLowerCase().trim();
        searchMatches = new Set();
        if (searchQuery) {
          for (var i = 0; i < nodes.length; i++) {
            if (nodes[i].id.toLowerCase().includes(searchQuery)) {
              searchMatches.add(nodes[i].id);
            }
          }
          document.getElementById("search-count").textContent = searchMatches.size + " matches";

          if (searchMatches.size === 1) {
            var match = nodes.find(function(n) { return searchMatches.has(n.id); });
            if (match) {
              camX = match.x;
              camY = match.y;
              camZoom = Math.max(camZoom, 2);
            }
          } else if (searchMatches.size > 1 && searchMatches.size <= 20) {
            var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (var i = 0; i < nodes.length; i++) {
              var n = nodes[i];
              if (!searchMatches.has(n.id)) continue;
              if (n.x < minX) minX = n.x;
              if (n.x > maxX) maxX = n.x;
              if (n.y < minY) minY = n.y;
              if (n.y > maxY) maxY = n.y;
            }
            camX = (minX + maxX) / 2;
            camY = (minY + maxY) / 2;
            var span = Math.max(maxX - minX, maxY - minY, 100);
            camZoom = Math.min(W, H) / (span * 1.5);
          }
        } else {
          document.getElementById("search-count").textContent = nodes.length + " tags";
        }
        updateZoomInfo();
        requestDraw();
      }, 150);
    });

    searchInput.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        searchInput.value = "";
        searchInput.dispatchEvent(new Event("input"));
        searchInput.blur();
      }
    });

    function updateZoomInfo() {
      var vt = visibleTier();
      var visible = 0;
      for (var i = 0; i < nodes.length; i++) {
        if (isNodeVisible(nodes[i])) visible++;
      }
      document.getElementById("info-zoom").textContent =
        "zoom: " + camZoom.toFixed(2) + "x | showing: " + visible + " tags (tier 0-" + vt + ")";
    }

    // --- Filters ---
    var openDropdown = null;

    var FACET_MAP = {
      country: "countries",
      decade: "decades",
      label: "labels",
      mood: "moods",
      vocalist: "vocalists",
    };

    function populateFilters() {
      Object.keys(FACET_MAP).forEach(function(cat) {
        var dd = document.getElementById("dd-" + cat);
        var items = facets[FACET_MAP[cat]];
        if (!items) return;

        // Add search for long lists
        if (Object.keys(items).length > 15) {
          var searchDiv = document.createElement("div");
          searchDiv.className = "filter-search";
          var searchInput = document.createElement("input");
          searchInput.placeholder = "search...";
          searchInput.addEventListener("input", function() {
            var q = this.value.toLowerCase();
            dd.querySelectorAll(".filter-option").forEach(function(opt) {
              opt.style.display = opt.dataset.value.includes(q) ? "" : "none";
            });
          });
          searchInput.addEventListener("click", function(e) { e.stopPropagation(); });
          searchDiv.appendChild(searchInput);
          dd.appendChild(searchDiv);
        }

        var sorted = Object.keys(items).sort(function(a, b) {
          return (items[b] || []).length - (items[a] || []).length;
        });

        sorted.forEach(function(val) {
          var div = document.createElement("div");
          div.className = "filter-option";
          div.dataset.value = val;
          div.textContent = val + " (" + (items[val] || []).length + ")";
          div.addEventListener("click", function(e) {
            e.stopPropagation();
            applyFilter(cat, val);
            closeAllDropdowns();
          });
          dd.appendChild(div);
        });
      });
    }

    function closeAllDropdowns() {
      document.querySelectorAll(".filter-dropdown").forEach(function(d) { d.classList.remove("show"); });
      document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("open"); });
      openDropdown = null;
    }

    // Toggle dropdown on button click
    document.querySelectorAll(".filter-btn").forEach(function(btn) {
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        var cat = btn.dataset.filter;
        var dd = document.getElementById("dd-" + cat);
        if (dd.classList.contains("show")) {
          closeAllDropdowns();
          return;
        }
        closeAllDropdowns();
        dd.classList.add("show");
        btn.classList.add("open");
        openDropdown = cat;
        // Focus search if present
        var si = dd.querySelector("input");
        if (si) si.focus();
      });
    });

    // Close on outside click
    document.addEventListener("click", function() { closeAllDropdowns(); });

    function applyFilter(category, value) {
      // Toggle off if same value
      if (activeFilter && activeFilter.category === category && activeFilter.value === value) {
        activeFilter = null;
        filterHighlight = new Set();
        document.querySelectorAll(".filter-btn").forEach(function(b) {
          b.classList.remove("active");
          var textNode = b.firstChild;
          if (textNode && textNode.nodeType === 3) textNode.textContent = b.dataset.filter;
        });
        requestDraw();
        return;
      }

      var facetKey = FACET_MAP[category];
      var genres = facets[facetKey] && facets[facetKey][value] ? facets[facetKey][value] : [];
      activeFilter = { category: category, value: value, genreSet: new Set(genres) };
      filterHighlight = activeFilter.genreSet;

      // Update button states and labels
      document.querySelectorAll(".filter-btn").forEach(function(b) {
        var cat = b.dataset.filter;
        var dd = document.getElementById("dd-" + cat);
        // Reset text node (first child) without destroying dropdown
        var textNode = b.firstChild;
        if (textNode && textNode.nodeType === 3) {
          textNode.textContent = cat === category ? value : cat;
        }
        if (cat === category) {
          b.classList.add("active");
        } else {
          b.classList.remove("active");
        }
      });

      requestDraw();
    }


    // --- Init ---
    resize();
    loadData();
  </script>
</body>
</html>
